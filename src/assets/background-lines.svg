<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%" fill="none">
  <!-- Grids -->
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#E2E8F0" stroke-width="1.5" />
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#F1F5F9" stroke-width="1" />
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#F1F5F9" stroke-width="1" />

  <!-- Perspective lines -->
  <line x1="100" y1="600" x2="600" y2="200" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="1100" y1="600" x2="600" y2="200" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Modern Building 1 (Left) -->
  <rect x="150" y="250" width="180" height="250" stroke="#CBD5E1" stroke-width="1.5" />
  <line x1="150" y1="300" x2="330" y2="300" stroke="#E2E8F0" stroke-width="1" />
  <line x1="150" y1="350" x2="330" y2="350" stroke="#E2E8F0" stroke-width="1" />
  <line x1="150" y1="400" x2="330" y2="400" stroke="#E2E8F0" stroke-width="1" />
  <line x1="150" y1="450" x2="330" y2="450" stroke="#E2E8F0" stroke-width="1" />
  <line x1="240" y1="250" x2="240" y2="500" stroke="#E2E8F0" stroke-width="1" />

  <!-- Modern Villa Outline 2 (Center-Right) -->
  <path d="M500,200 L750,200 L750,500 L500,500 Z" stroke="#94A3B8" stroke-width="1.5" />
  <path d="M450,300 L650,300 L650,500 L450,500 Z" stroke="#64748B" stroke-width="1.5" />
  <line x1="450" y1="200" x2="500" y2="200" stroke="#CBD5E1" stroke-width="1.5" />
  <line x1="450" y1="300" x2="500" y2="300" stroke="#CBD5E1" stroke-width="1.5" />

  <!-- Angular roof feature -->
  <path d="M500,200 L625,120 L750,200" stroke="#475569" stroke-width="2" />
  <circle cx="625" cy="120" r="4" fill="#FF9914" />

  <!-- Additional grid lines for details -->
  <line x1="500" y1="350" x2="750" y2="350" stroke="#E2E8F0" stroke-width="1" />
  <line x1="500" y1="400" x2="750" y2="400" stroke="#E2E8F0" stroke-width="1" />
  <line x1="500" y1="450" x2="750" y2="450" stroke="#E2E8F0" stroke-width="1" />

  <!-- Skyscraper 3 (Right) -->
  <rect x="850" y="100" width="160" height="400" stroke="#CBD5E1" stroke-width="1.5" />
  <line x1="850" y1="150" x2="1010" y2="150" stroke="#E2E8F0" stroke-width="1" />
  <line x1="850" y1="200" x2="1010" y2="200" stroke="#E2E8F0" stroke-width="1" />
  <line x1="850" y1="250" x2="1010" y2="250" stroke="#E2E8F0" stroke-width="1" />
  <line x1="850" y1="300" x2="1010" y2="300" stroke="#E2E8F0" stroke-width="1" />
  <line x1="850" y1="350" x2="1010" y2="350" stroke="#E2E8F0" stroke-width="1" />
  <line x1="850" y1="400" x2="1010" y2="400" stroke="#E2E8F0" stroke-width="1" />
  <line x1="850" y1="450" x2="1010" y2="450" stroke="#E2E8F0" stroke-width="1" />
  <line x1="930" y1="100" x2="930" y2="500" stroke="#E2E8F0" stroke-width="1" />
</svg>
