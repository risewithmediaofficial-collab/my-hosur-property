name: Cypress E2E

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cypress-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress-run:
    name: Build and run Cypress
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run Cypress tests
        id: cypress
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: npm run dev -- --host 0.0.0.0
          wait-on: "http://localhost:5173"
          wait-on-timeout: 120
          config-file: cypress.config.js
          record: true
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          DEBUG: "@cypress/github-action"

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          if-no-files-found: ignore
          path: cypress/screenshots
          retention-days: 14

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-videos
          if-no-files-found: ignore
          path: cypress/videos
          retention-days: 14

      - name: Print Cypress Cloud run URL
        if: always()
        run: |
          echo "Cypress step outcome: ${{ steps.cypress.outcome }}"
          echo "Cypress Cloud results: ${{ steps.cypress.outputs.resultsUrl }}"
